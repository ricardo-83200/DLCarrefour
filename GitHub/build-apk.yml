name: Build Android APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create Fresh Project & Inject Code
        run: |
          flutter create fresh_app --platforms=android
          cd fresh_app
          flutter pub add mobile_scanner http intl permission_handler
          
          # 1. Injection de la permission caméra dans la configuration Android
          sed -i '/<manifest xmlns:android="http:\/\/schemas.android.com\/apk\/res\/android">/a \    <uses-permission android:name="android.permission.CAMERA" \/>' android/app/src/main/AndroidManifest.xml
          
          # 2. Forcer la version minimale Android requise pour le scanner (SDK 21)
          sed -i 's/minSdkVersion .*/minSdkVersion 21/g' android/app/build.gradle
          
          # 3. TECHNIQUE ULTIME : Forcer l'application à utiliser un thème Android standard pour la caméra
          sed -i 's/android:theme="@style\/LaunchTheme"/android:theme="@android:style\/Theme.Material.NoActionBar"/g' android/app/src/main/AndroidManifest.xml
          
          cp ../lib/main.dart lib/main.dart

      - name: Build APK
        run: |
          cd fresh_app
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: fresh_app/build/app/outputs/flutter-apk/app-release.apk